<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartPonto | Ponto Inteligente</title>
    <meta name="theme-color" content="#4f46e5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/favicon.ico" sizes="32x32">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
          },
        },
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --app-height: 100%; }
        body { 
          font-family: 'Inter', sans-serif; 
          -webkit-tap-highlight-color: transparent;
          transition: background-color 0.3s ease, color 0.3s ease;
        }
        .glass-card { 
          background: rgba(255, 255, 255, 0.7); 
          backdrop-filter: blur(16px); 
          border: 1px solid rgba(255, 255, 255, 0.4); 
          box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.05);
        }
        .dark .glass-card {
          background: rgba(30, 41, 59, 0.7);
          border: 1px solid rgba(255, 255, 255, 0.05);
          box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.3);
        }
        .gradient-bg {
          background: radial-gradient(circle at top right, #f8fafc 0%, #f1f5f9 100%);
        }
        .dark .gradient-bg {
          background: radial-gradient(circle at top right, #0f172a 0%, #020617 100%);
        }
        @keyframes subtle-pulse {
          0%, 100% { opacity: 1; transform: scale(1); }
          50% { opacity: 0.8; transform: scale(0.98); }
        }
        .active-pulse { animation: subtle-pulse 2s infinite ease-in-out; }
        
        /* Custom scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); }

        /* Acessibilidade: Skip Link */
        .skip-link {
          position: absolute;
          top: -40px;
          left: 0;
          background: #4f46e5;
          color: white;
          padding: 8px;
          z-index: 1000;
          transition: top 0.3s;
        }
        .skip-link:focus {
          top: 0;
        }

        /* Foco visível aprimorado para navegação por teclado */
        :focus-visible {
          outline: 3px solid #4f46e5;
          outline-offset: 2px;
        }
        .dark :focus-visible {
          outline: 3px solid #818cf8;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "recharts": "https://esm.sh/recharts@2.12.7"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="gradient-bg text-slate-900 dark:text-slate-100 min-h-screen">
    <a href="#main-content" class="skip-link">Pular para o conteúdo principal</a>
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
<script>
  // Registrar Service Worker
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .then((registration) => {
          console.log('SW registered:', registration);
        })
        .catch((error) => {
          console.log('SW registration failed:', error);
        });
    });
  }
</script>
</body>
</html>
