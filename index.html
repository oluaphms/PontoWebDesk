<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartPonto | Ponto Inteligente</title>
    <meta name="theme-color" content="#4f46e5">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/favicon.ico" sizes="32x32">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --app-height: 100%; }
        body { 
          font-family: 'Inter', sans-serif; 
          -webkit-tap-highlight-color: transparent;
          transition: background-color 0.3s ease, color 0.3s ease;
        }
        .glass-card { 
          background: rgba(255, 255, 255, 0.7); 
          backdrop-filter: blur(16px); 
          border: 1px solid rgba(255, 255, 255, 0.4); 
          box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.05);
        }
        .dark .glass-card {
          background: rgba(30, 41, 59, 0.7);
          border: 1px solid rgba(255, 255, 255, 0.05);
          box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.3);
        }
        .gradient-bg {
          background: radial-gradient(circle at top right, #f8fafc 0%, #f1f5f9 100%);
        }
        .dark .gradient-bg {
          background: radial-gradient(circle at top right, #0f172a 0%, #020617 100%);
        }
        @keyframes subtle-pulse {
          0%, 100% { opacity: 1; transform: scale(1); }
          50% { opacity: 0.8; transform: scale(0.98); }
        }
        .active-pulse { animation: subtle-pulse 2s infinite ease-in-out; }
        
        /* Custom scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); }

        /* Acessibilidade: Skip Link */
        .skip-link {
          position: absolute;
          top: -40px;
          left: 0;
          background: #4f46e5;
          color: white;
          padding: 8px;
          z-index: 1000;
          transition: top 0.3s;
        }
        .skip-link:focus {
          top: 0;
        }

        /* Foco visível aprimorado para navegação por teclado */
        :focus-visible {
          outline: 3px solid #4f46e5;
          outline-offset: 2px;
        }
        .dark :focus-visible {
          outline: 3px solid #818cf8;
        }
    </style>
</head>
<body class="gradient-bg text-slate-900 dark:text-slate-100 min-h-screen">
    <a href="#main-content" class="skip-link">Pular para o conteúdo principal</a>
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
<script>
  // Limpar Service Workers e caches antigos COMPLETAMENTE - EXECUTAR IMEDIATAMENTE
  (function() {
    'use strict';
    if ('serviceWorker' in navigator) {
      // Executar imediatamente, sem esperar load
      (async function() {
        try {
          // Desregistrar TODOS os Service Workers
          const registrations = await navigator.serviceWorker.getRegistrations();
          let cacheNames = [];
          
          if ('caches' in window) {
            cacheNames = await caches.keys();
          }
          
          // Desregistrar todos os SWs
          for (let registration of registrations) {
            try {
              const unregistered = await registration.unregister();
              console.log('[CLEANUP] SW unregistered:', registration.scope, unregistered);
            } catch (e) {
              console.error('[CLEANUP] Error unregistering SW:', e);
            }
          }
          
          // Limpar TODOS os caches
          if (cacheNames.length > 0) {
            await Promise.all(cacheNames.map(name => {
              console.log('[CLEANUP] Deleting cache:', name);
              return caches.delete(name);
            }));
            console.log('[CLEANUP] All caches cleared');
          }
          
          // Se havia SWs ou caches, recarregar para garantir limpeza completa
          if (registrations.length > 0 || cacheNames.length > 0) {
            console.log('[CLEANUP] Reloading to ensure clean state...');
            // Usar replace para evitar adicionar ao histórico
            setTimeout(() => window.location.replace(window.location.href), 50);
          }
        } catch (error) {
          console.error('[CLEANUP] Error:', error);
        }
      })();
    }
    
    // Também limpar quando a página carregar (backup)
    window.addEventListener('load', function() {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.unregister();
          }
        });
      }
      if ('caches' in window) {
        caches.keys().then(function(names) {
          for (let name of names) {
            caches.delete(name);
          }
        });
      }
    });
  })();
</script>
</body>
</html>
